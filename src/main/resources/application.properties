spring.application.name=socialsphere

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/socialsphere?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:socialsphere_user}
spring.datasource.password=${DB_PASSWORD:Ansari123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET:mySocialSphereSuperSecretKeyForJWTSigning2026ChangeThisLater}

# File Upload
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB